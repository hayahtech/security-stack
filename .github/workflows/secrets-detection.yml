name: Secrets Detection — Gitleaks + TruffleHog

on:
  workflow_call: {}
  pull_request:
    types: [opened, synchronize]
  push:
    branches: [main, staging]

permissions:
  contents: read
  pull-requests: write

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --verbose --exit-code 1 --report-path gitleaks-report.json
        continue-on-error: true

      - name: Parse Gitleaks Results
        if: always()
        run: |
          if [ -f gitleaks-report.json ]; then
            SECRETS=$(jq 'length' gitleaks-report.json)
            echo "::warning::Gitleaks found $SECRETS potential secrets"

            # Show findings
            jq -r '.[] | "  - \(.Match) in \(.File):\(.StartLine)"' gitleaks-report.json | head -10
          fi

      - name: Upload Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: gitleaks-report
          path: gitleaks-report.json

  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch || 'main' }}
          head: HEAD
          extra_args: --debug --only-verified --json
        continue-on-error: true

      - name: Check TruffleHog Results
        if: always()
        run: |
          if [ -f truffles.json ]; then
            VERIFIED=$(jq '[.[] | select(.verified==true)] | length' truffles.json || echo 0)
            if [ "$VERIFIED" -gt 0 ]; then
              echo "::error::TruffleHog found $VERIFIED VERIFIED secrets — immediate action required"
              echo ""
              echo "Actions:"
              echo "1. REVOKE the exposed secrets immediately"
              echo "2. Rotate credentials"
              echo "3. Scan commit history for other instances"
              exit 1
            fi
          fi

  secret-patterns:
    name: Custom Secret Pattern Detection
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Detect Common Patterns
        run: |
          echo "Scanning for common secret patterns..."

          # API Keys
          if grep -r "api[_-]key\s*=\s*['\"]" --include="*.js" --include="*.ts" --include="*.py" .; then
            echo "::error::Found hardcoded API key pattern"
            exit 1
          fi

          # Private Keys
          if grep -r "BEGIN.*PRIVATE KEY" . --include="*.pem" --include="*.key" --include="*.txt" 2>/dev/null | grep -v ".git" | grep -v "node_modules"; then
            echo "::error::Found private key file"
            exit 1
          fi

          # AWS Keys
          if grep -r "AKIA[0-9A-Z]\{16\}" . --include="*.js" --include="*.py" --include="*.env" 2>/dev/null; then
            echo "::error::Found potential AWS access key"
            exit 1
          fi

          # Database URLs with credentials
          if grep -r "postgres://.*:.*@\|mongodb://.*:.*@\|mysql://.*:.*@" . --include="*.js" --include="*.py" --include="*.env" 2>/dev/null | grep -v ".git" | grep -v "node_modules"; then
            echo "::error::Found database URL with credentials"
            exit 1
          fi

          echo "✅ No obvious secrets detected"
        continue-on-error: true
