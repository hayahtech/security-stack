name: Supply Chain Security — Dependencies

on:
  pull_request:
    paths: ['package.json', 'package-lock.json', 'yarn.lock', 'pnpm-lock.yaml', 'requirements.txt', 'Pipfile', 'go.mod', 'Cargo.toml']
  push:
    branches: [main, staging]
  schedule:
    - cron: '0 2 * * *' # Daily at 2 AM

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Run npm audit
        id: audit
        run: |
          npm audit --audit-level=moderate 2>&1 | tee npm-audit.log || true

          # Parse findings
          CRITICAL=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(npm audit --json 2>/dev/null | jq '.metadata.vulnerabilities.high // 0')

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL critical vulnerabilities"
            exit 1
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit.log

  snyk:
    name: Snyk — Dependency Scanning
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != '' && secrets.SNYK_TOKEN != ''

    steps:
      - uses: actions/checkout@v4

      - uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --fail-on=all
        continue-on-error: true

      - name: Create Issue if Vulnerabilities Found
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[SECURITY] Snyk found vulnerable dependencies',
              body: 'Check Snyk report in CI/CD logs. Run `snyk test` locally.',
              labels: ['security', 'dependencies']
            });

  python-audit:
    name: pip-audit (Python)
    runs-on: ubuntu-latest
    if: hashFiles('requirements.txt', 'pyproject.toml') != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            --skip-editable \
            --strict \
            --format json > pip-audit.json || true

          # Check for critical
          CRITICAL=$(jq '[.vulnerabilities[] | select(.fix_available==false)] | length' pip-audit.json || echo 0)
          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Found $CRITICAL unpatched Python vulnerabilities"
            exit 1
          fi

      - name: Upload Results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: pip-audit-report
          path: pip-audit.json

  go-audit:
    name: go list -m all (Go)
    runs-on: ubuntu-latest
    if: hashFiles('go.mod') != ''

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
          cache: true

      - name: Check Go Dependencies
        run: |
          go list -u -m -json all | go run github.com/oliverchang/go-tools/cmd/nancy@latest sleuth
        continue-on-error: true
