# =============================================================================
# Trato Gestão Rural — Configuração de Segurança Nginx
# Aplique este bloco dentro do seu server {} em produção
# =============================================================================

server {
    listen 443 ssl http2;
    server_name seu-dominio.com.br;

    # --- TLS ---
    ssl_certificate     /etc/ssl/certs/seu-dominio.crt;
    ssl_certificate_key /etc/ssl/private/seu-dominio.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # --- Headers de Segurança ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(), usb=(), bluetooth=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.supabase.co https://*.supabase.in; connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co https://api.open-meteo.com https://brasilapi.com.br https://nominatim.openstreetmap.org https://viacep.com.br; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

    # Remove informações do servidor
    server_tokens off;
    more_clear_headers Server;
    more_clear_headers X-Powered-By;

    # --- Rate Limiting (protege contra força bruta e DDoS) ---
    limit_req_zone $binary_remote_addr zone=app:10m rate=30r/m;
    limit_req zone=app burst=10 nodelay;
    limit_req_status 429;

    # --- Root do app ---
    root /var/www/trato-gestao-rural/dist;
    index index.html;

    # Assets estáticos com hash — cacheados por 1 ano
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Service Worker — nunca cacheado
    location /sw.js {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback — todas as rotas retornam index.html
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Bloqueia acesso a arquivos ocultos (.env, .git, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# Redireciona HTTP para HTTPS
server {
    listen 80;
    server_name seu-dominio.com.br;
    return 301 https://$host$request_uri;
}
