<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>AgroFinance Pro — Gestão Financeira e Agropecuária</title>
    <meta name="description" content="Sistema de gestão financeira e de fazenda multi-tenant. Controle pessoal e empresarial." />
    <meta name="author" content="AgroFinance Pro" />
    <meta property="og:title" content="AgroFinance Pro" />
    <meta property="og:description" content="Gestão financeira e agropecuária inteligente." />
    <meta property="og:type" content="website" />
    <!--
      Content Security Policy (CSP) — Restringe origens de recursos para prevenir XSS e injeção.
      IMPORTANTE: Em produção, estes headers devem ser servidos pelo servidor (nginx/_headers)
      pois headers HTTP têm precedência sobre meta tags e cobrem mais vetores de ataque.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'wasm-unsafe-eval';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https://*.tile.openstreetmap.org https://*.supabase.co https://*.supabase.in;
      connect-src
        'self'
        https://*.supabase.co
        https://*.supabase.in
        wss://*.supabase.co
        https://api.open-meteo.com
        https://brasilapi.com.br
        https://nominatim.openstreetmap.org
        https://viacep.com.br
        https://purecatamphetamine.github.io;
      worker-src 'self' blob:;
      manifest-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
      frame-ancestors 'none';
      upgrade-insecure-requests;
    " />
    <!-- Impede que o app seja exibido em iframes (proteção contra Clickjacking) -->
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <!-- Impede MIME-type sniffing -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <!-- Não vaza a URL de origem ao navegar para outros sites -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta name="theme-color" content="#1A6B3C" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AgroFinance" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="icon" href="/pwa-192x192.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
