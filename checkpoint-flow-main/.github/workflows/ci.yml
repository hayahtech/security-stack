name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-audit:
    name: Build + Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
        env:
          # Usa valores stub para o build de CI — não conecta ao Supabase real
          VITE_SUPABASE_URL: https://stub.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: stub-anon-key
          VITE_SUPABASE_PROJECT_ID: stub-project-id
          # Sentry desabilitado em CI (sem DSN)
          VITE_SENTRY_DSN: ''

      - name: Security audit (npm audit)
        # --audit-level=high falha o CI apenas para vulnerabilidades high/critical
        # moderate e low são reportadas mas não bloqueiam o merge
        run: npm audit --audit-level=high
        continue-on-error: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: dist
          path: dist/
          retention-days: 7
